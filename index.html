<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joyce Portfolio</title>
    <script>
      // Suppress the "Cannot set property fetch of #<Window>" error which is a known issue with some polyfills in this environment
      window.addEventListener('error', function(e) {
        if (e.message && e.message.includes('Cannot set property fetch')) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && e.reason.message.includes('Cannot set property fetch')) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
